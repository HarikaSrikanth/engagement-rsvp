name: Daily RSVP summary

on:
  schedule:
    - cron: '0 23 * * *'   # Runs daily at 23:00 UTC (adjust as needed)

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submissions.json from repo (if present)
        run: |
          if curl -sfL "https://raw.githubusercontent.com/${{ github.repository }}/main/submissions.json" -o submissions.json; then
            echo "submissions.json downloaded"
          else
            echo "No submissions.json found; creating empty file"; echo "[]" > submissions.json
          fi

      - name: Send daily summary email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          node --version
          npm --version || true
          node scripts/send_summary.js
