name: Daily RSVP issue summary

permissions:
  issues: write

on:
  schedule:
    - cron: '0 23 * * *' # daily at 23:00 UTC
  workflow_dispatch: {}

jobs:
  issue-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run create_issue script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/create_issue.js
